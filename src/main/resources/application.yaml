server:
  port: 8081

spring:
  application:
    name: techcup-futbol

  datasource:
    url: ${DB_URL:jdbc:h2:mem:techcupdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USER:sa}
    password: ${DB_PASS:lo}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: ${JPA_DIALECT:org.hibernate.dialect.H2Dialect}

springdoc:
  swagger-ui:
    path: /api-docs

logging:
  level:
    root: INFO
    com.techcup.techcup_futbol: DEBUG
    org.springframework: INFO
    org.hibernate: WARN

  file:
    name: logs/techcup.log

jwt:
  secret: ${JWT_SECRET:TechCupFutbol2026ClaveSecretaMuyLargaParaQueSean256BitsMinimo!!}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}
