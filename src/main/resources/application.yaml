server:
  port: 8080

spring:
  application:
    name: techcup-futbol
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

springdoc:
  swagger-ui:
    path: /api-docs

logging:
  level:
    root: INFO
    com.techcup.techcup_futbol: DEBUG
    org.springframework: INFO
    org.hibernate: WARN
  file:
    name: logs/techcup.log

jwt:
  secret: "TechCupFutbol2026ClaveSecretaMuyLargaParaQueSean256BitsMinimo!!"
  expiration-ms: 86400000
