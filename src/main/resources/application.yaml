server:
  port: 8081

spring:
  application:
    name: techcup-futbol
  datasource:
    url: ${DB_URL:jdbc:h2:mem:techcupdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USER:dosw}
    password: ${DB_PASS:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: ${SQL_INIT_MODE:never}
      platform: postgresql
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: ${JPA_DIALECT:org.hibernate.dialect.H2Dialect}
    open-in-view: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/google"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    url: /api-docs
    operations-sorter: alpha
  api-docs:
    path: /api-docs
    oauth:
      client-id: ${GOOGLE_CLIENT_ID}

logging:
  level:
    root: INFO
    com.techcup.techcup_futbol: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
  file:
    name: logs/techcup.log

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  org-token: ${ORG_TOKEN:TECHCUP-ORG-2025}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
