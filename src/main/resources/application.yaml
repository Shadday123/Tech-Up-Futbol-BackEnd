server:
  port: 8081

spring:
  application:
    name: techcup-futbol
  datasource:
    url: ${DB_URL:jdbc:h2:mem:techcupdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USER:Asgard}
    password: ${DB_PASS:DOSW}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: ${JPA_DIALECT:org.hibernate.dialect.H2Dialect}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

logging:
  level:
    root: INFO
    com.techcup.techcup_futbol: DEBUG
    org.springframework: INFO
    org.hibernate: WARN
  file:
    name: logs/techcup.log

jwt:
  secret: ${JWT_SECRET:TechCupFutbol2026ClaveSecretaMuyLargaParaQueSean256BitsMinimo!!}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}